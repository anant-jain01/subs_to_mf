[theme]
base = "dark"
primaryColor = "#4FC3F7"
backgroundColor = "#0A0E1A"
secondaryBackgroundColor = "#0F1629"
textColor = "#E8EAF0"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
